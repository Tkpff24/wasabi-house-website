<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wasabi House underground club — enter." />
    <title>Wasabi House — Gate</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="gate">
    <a class="skip-link" href="#enterBtn">Skip to enter</a>

    <div id="gateScreen" class="gate-screen" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
      <div class="container gate-inner">
        <div class="gate-logo">
          <img
            src="./photos/logo/IMG_7840_VSCO copy.png"
            alt="Wasabi House logo"
            width="92"
            height="92"
          />
        </div>
        <div class="gate-tagline">
          <h1 class="gate-title" id="gateTitle">Breath deeply before enter.</h1>
          <a class="btn btn-primary gate-enter" id="enterBtn" href="./home.html">Enter →</a>
        </div>
      </div>
      <div class="gate-bg" aria-hidden="true"></div>
      <div class="gate-scan" aria-hidden="true"></div>
    </div>
  </body>
</html>
