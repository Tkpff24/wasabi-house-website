<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wasabi House past event poster details." />
    <title>Wasabi House — Poster</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="poster-page">
    <main id="main">
      <section class="section poster-section">
        <div class="container section-inner">
          <div class="poster-layout">
            <div class="poster-frame">
              <img id="posterImg" alt="Past event poster" />
            </div>
            <article class="poster-details" aria-live="polite">
              <h2 id="posterTitle">Past event poster</h2>
              <p id="posterTagline" class="muted">All details are shown on the poster.</p>
              <div class="poster-meta">
                <p><strong>Date:</strong> <span id="posterDate">-</span></p>
                <p><strong>Open:</strong> <span id="posterOpen">-</span></p>
                <p><strong>Door:</strong> <span id="posterDoor">-</span></p>
                <p><strong>Location:</strong> <span id="posterLocation">Wasabi House</span></p>
                <p><strong>Music:</strong> <span id="posterMusic">-</span></p>
                <p><strong>Live:</strong> <span id="posterLive">-</span></p>
                <p><strong>Visual:</strong> <span id="posterVisual">-</span></p>
                <p><strong>Exhibition:</strong> <span id="posterExhibition">-</span></p>
                <p><strong>Tattoo:</strong> <span id="posterTattoo">-</span></p>
                <p><strong>Workshop:</strong> <span id="posterWorkshop">-</span></p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <div class="instagram-id">@wasabihouse_bkk</div>

    <script src="./poster.js"></script>
  </body>
</html>
